name: Build and Push Images

on:
  push:
    branches: [main]
  workflow_dispatch: {}

env:
  AWS_REGION: ap-southeast-1

permissions:
  id-token: write
  contents: read

jobs:
  build-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - service: agent-worker
            cmd_path: ./cmd/worker
          - service: dispatcher
            cmd_path: ./cmd/dispatcher
          - service: reaper
            cmd_path: ./cmd/heartbeat-reaper
          - service: salience-decay
            cmd_path: ./cmd/salience-decay
          - service: scoring-api
            cmd_path: ./cmd/scoring-api
          - service: review-api
            cmd_path: ./cmd/review-api

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push ${{ matrix.service }}
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          REPO="${ECR_REGISTRY}/hivemind/dev/${{ matrix.service }}"
          docker build --provenance=false --sbom=false -f Dockerfile.lambda-go \
            --build-arg SERVICE_PATH=${{ matrix.cmd_path }} \
            -t "${REPO}:${IMAGE_TAG}" \
            -t "${REPO}:latest" .
          docker push "${REPO}:${IMAGE_TAG}"
          docker push "${REPO}:latest"

  build-push-scoring-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push scoring-python
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          REPO="${ECR_REGISTRY}/hivemind/dev/scoring-python"
          docker build --provenance=false --sbom=false -f services/scoring-python/Dockerfile \
            -t "${REPO}:${IMAGE_TAG}" \
            -t "${REPO}:latest" .
          docker push "${REPO}:${IMAGE_TAG}"
          docker push "${REPO}:latest"
